global:
  scrape_interval: 5s

scrape_configs:
  - job_name: idregistry
    static_configs:
      - targets: ['host.docker.internal:9091']

  - job_name: joiner
    static_configs:
      - targets: ['host.docker.internal:9093']

  - job_name: dispatcher
    static_configs:
      - targets: ['host.docker.internal:9094']
