syntax = "proto3";

package photon;

option java_package         = "com.photon.proto";
option java_multiple_files  = true;

// ═════════════════════════════════════════════════════════════════════════════
// IdRegistry — exactly-once gate (§2)
// ═════════════════════════════════════════════════════════════════════════════

service IdRegistryService {
  rpc Lookup (LookupRequest)  returns (LookupResponse);
  rpc Insert (InsertRequest)  returns (InsertResponse);
}

message LookupRequest {
  fixed64 event_id = 1;
}

message LookupResponse {
  bool exists = 1;
}

message InsertRequest {
  fixed64 event_id      = 1;
  string  token         = 2;  // "host:pid:startMs" — crash-recovery token (§3.3.2)
  int64   hlc_timestamp = 3;  // full HLC for GC age check; 0 = skip
}

message InsertResponse {
  enum Status {
    SUCCESS        = 0;
    ALREADY_EXISTS = 1;
    RETRY          = 2;
    TOO_OLD        = 3;
  }
  Status status = 1;
}

// ═════════════════════════════════════════════════════════════════════════════
// Joiner — stateless stream-join server (§3.3)
// ═════════════════════════════════════════════════════════════════════════════
//
// The Dispatcher sends each foreign event (click) here.
// The Joiner looks up the corresponding primary event (query) in EventStore,
// registers the click_id in IdRegistry, and writes the joined event to the
// output Kafka topic.

service JoinerService {
  rpc Join (JoinRequest) returns (JoinResponse);
}

message JoinRequest {
  fixed64 click_event_id  = 1;  // packed EventId.value of the click
  int64   click_hlc       = 2;  // full HLC — used for IdRegistry age check
  string  query_id        = 3;  // primary key to look up in EventStore
  bytes   click_payload   = 4;  // raw serialised click event bytes
}

message JoinResponse {
  enum Status {
    JOINED          = 0;  // joined and written to output — dispatcher is done
    QUERY_NOT_FOUND = 1;  // query not in EventStore yet — dispatcher must retry
    ALREADY_JOINED  = 2;  // duplicate — dispatcher must drop
    UNJOINABLE      = 3;  // too old or permanently missing — treat as wasted join
    THROTTLED       = 4;  // joiner overloaded — dispatcher must back off
  }
  Status status = 1;
}
